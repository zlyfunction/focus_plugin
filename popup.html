<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Reader</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      font-size: 13px;
      color: #1c1c1e;
      background: #f2f2f7;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1c1c1e; color: #f2f2f7; }
      .card { background: #2c2c2e; }
      .section-title { color: #98989d; }
      .toggle-track { background: #3a3a3c; }
      .option-btn { background: #3a3a3c; color: #f2f2f7; }
      .option-btn:hover { background: #48484a; }
      .option-btn.active { background: #0a84ff; color: #fff; }
      .badge { background: #3a3a3c; color: #98989d; }
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
    }

    .title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .subtitle {
      font-size: 11px;
      color: #8e8e93;
      margin-top: 1px;
    }

    /* 主开关 */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-track {
      position: relative;
      width: 44px;
      height: 26px;
      background: #e5e5ea;
      border-radius: 13px;
      cursor: pointer;
      transition: background 0.2s ease;
      flex-shrink: 0;
    }

    .toggle-track.on {
      background: #34c759;
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
      transition: transform 0.2s ease;
    }

    .toggle-track.on .toggle-thumb {
      transform: translateX(18px);
    }

    /* 卡片 */
    .card {
      background: #fff;
      border-radius: 12px;
      margin: 0 10px 10px;
      overflow: hidden;
    }

    .card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
    }

    .card-row + .card-row {
      border-top: 0.5px solid #e5e5ea;
    }

    @media (prefers-color-scheme: dark) {
      .card-row + .card-row { border-top-color: #3a3a3c; }
    }

    .row-label {
      font-size: 13px;
      font-weight: 500;
      color: #1c1c1e;
    }

    @media (prefers-color-scheme: dark) {
      .row-label { color: #f2f2f7; }
    }

    .row-label-secondary {
      font-size: 12px;
      font-weight: 400;
      color: #3c3c3e;
    }

    @media (prefers-color-scheme: dark) {
      .row-label-secondary { color: #ebebf5; }
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #3c3c3e;
      padding: 6px 16px 4px;
    }

    @media (prefers-color-scheme: dark) {
      .section-title { color: #ebebf5; }
    }

    .hint-text {
      font-size: 11px;
      color: #3c3c3e;
      margin-top: 1px;
      min-height: 14px;
    }

    @media (prefers-color-scheme: dark) {
      .hint-text { color: #ebebf5; }
    }

    /* 选项按钮组 */
    .option-group {
      display: flex;
      gap: 5px;
    }

    .option-btn {
      font-size: 12px;
      padding: 7px 10px;
      min-height: 32px;
      border-radius: 6px;
      border: none;
      background: #e5e5ea;
      color: #1c1c1e;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
    }

    .option-btn:focus-visible {
      outline: 2px solid #007aff;
      outline-offset: 2px;
    }

    .option-btn:hover {
      background: #d1d1d6;
    }

    .option-btn.active {
      background: #007aff;
      color: #fff;
    }

    /* 颜色选择器 */
    .color-group {
      display: flex;
      gap: 8px;
    }

    .color-dot {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
      border: 2.5px solid transparent;
      transition: border-color 0.15s, transform 0.15s;
    }

    .color-dot:hover {
      transform: scale(1.1);
    }

    .color-dot:focus-visible {
      outline: 2px solid #007aff;
      outline-offset: 3px;
    }

    .color-dot.active {
      border-color: #007aff;
    }

    .color-dot[data-color="yellow"]  { background: #ffd600; }
    .color-dot[data-color="green"]   { background: #4cd964; }
    .color-dot[data-color="blue"]    { background: #5ac8fa; }
    .color-dot[data-color="pink"]    { background: #ff6b9d; }

    /* 兼容提示 */
    .badge {
      font-size: 10px;
      background: #e5e5ea;
      color: #6c6c70;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .badge-learning {
      background: #fff3e0;
      color: #e65100;
    }

    .badge-calibrated {
      background: #e8f5e9;
      color: #2e7d32;
    }

    @media (prefers-color-scheme: dark) {
      .badge-learning   { background: #3a2a1a; color: #ff9800; }
      .badge-calibrated { background: #1a2e1a; color: #66bb6a; }
    }

    .footer {
      padding: 6px 16px 12px;
      font-size: 11px;
      color: #8e8e93;
      text-align: left;
    }

    /* AI 设置区域 */
    .ai-field {
      padding: 10px 14px 8px;
    }

    .ai-field + .ai-field {
      border-top: 0.5px solid #c7c7cc;
    }

    @media (prefers-color-scheme: dark) {
      .ai-field + .ai-field { border-top-color: #48484a; }
    }

    .ai-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #1c1c1e;
      margin-bottom: 6px;
    }

    @media (prefers-color-scheme: dark) {
      .ai-label { color: #f2f2f7; }
    }

    .ai-input {
      display: block;
      width: 100%;
      font-size: 13px;
      font-family: inherit;
      color: #000;
      background: #fff;
      border: 2px solid #8e8e93;
      border-radius: 8px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
      box-sizing: border-box;
    }

    .ai-input:focus {
      border-color: #007aff;
      box-shadow: 0 0 0 3px rgba(0,122,255,0.15);
    }

    .ai-input::placeholder {
      color: #8e8e93;
    }

    @media (prefers-color-scheme: dark) {
      .ai-input {
        color: #fff;
        background: #1c1c1e;
        border-color: #636366;
      }
      .ai-input::placeholder { color: #636366; }
      .ai-input:focus { border-color: #0a84ff; box-shadow: 0 0 0 3px rgba(10,132,255,0.2); }
    }

    .ai-shortcuts {
      padding: 8px 14px 10px;
      font-size: 12px;
      color: #3c3c3e;
      border-top: 0.5px solid #c7c7cc;
      font-weight: 500;
    }

    @media (prefers-color-scheme: dark) {
      .ai-shortcuts { border-top-color: #48484a; color: #ebebf5; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <div class="title">🔍 Focus Reader</div>
      <div class="subtitle">阅读辅助高亮</div>
    </div>
    <div class="toggle-wrap">
      <div class="toggle-track" id="mainToggle">
        <div class="toggle-thumb"></div>
      </div>
    </div>
  </div>

  <div id="settingsPanel">

    <div class="section-title">高亮模式</div>
    <div class="card">
      <div class="card-row">
        <span class="row-label">显示方式</span>
        <div class="option-group">
          <button class="option-btn" data-mode="guide">导引条</button>
          <button class="option-btn" data-mode="text">文字</button>
        </div>
      </div>
      <div class="card-row">
        <span class="row-label">阅读列模式</span>
        <div class="toggle-wrap">
          <div class="toggle-track" id="columnToggle">
            <div class="toggle-thumb"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="section-title">颜色</div>
    <div class="card">
      <div class="card-row">
        <span class="row-label">高亮颜色</span>
        <div class="color-group">
          <div class="color-dot" data-color="yellow" title="黄色" tabindex="0" role="radio" aria-label="黄色"></div>
          <div class="color-dot" data-color="green"  title="绿色" tabindex="0" role="radio" aria-label="绿色"></div>
          <div class="color-dot" data-color="blue"   title="蓝色" tabindex="0" role="radio" aria-label="蓝色"></div>
          <div class="color-dot" data-color="pink"   title="粉色" tabindex="0" role="radio" aria-label="粉色"></div>
        </div>
      </div>
      <div class="card-row">
        <span class="row-label">强度</span>
        <div class="option-group">
          <button class="option-btn" data-opacity="light">淡</button>
          <button class="option-btn" data-opacity="medium">中</button>
          <button class="option-btn" data-opacity="strong">深</button>
        </div>
      </div>
    </div>

    <div id="adaptiveSection" aria-live="polite">
      <div class="section-title">自适应</div>
      <div class="card">
        <div class="card-row">
          <span class="row-label">自适应学习</span>
          <div class="toggle-wrap">
            <div class="toggle-track" id="adaptiveToggle">
              <div class="toggle-thumb"></div>
            </div>
          </div>
        </div>
        <div class="card-row" id="adaptiveStatusRow">
          <div>
            <span class="row-label-secondary">校准状态</span>
            <div id="adaptiveHint" class="hint-text"></div>
          </div>
          <span class="badge" id="adaptiveStatus" title="">—</span>
        </div>
      </div>
    </div>

    <div id="profilesSection" style="display:none">
      <div class="section-title">域名档案</div>
      <div class="card" id="profilesCard"></div>
    </div>

    <div class="section-title">AI 设置</div>
    <div class="card">
      <div class="ai-field">
        <label class="ai-label" for="apiKeyInput">API Key</label>
        <input type="password" id="apiKeyInput" class="ai-input" placeholder="sk-…" autocomplete="off" />
      </div>
      <div class="ai-field">
        <label class="ai-label" for="apiEndpointInput">接口地址</label>
        <input type="text" id="apiEndpointInput" class="ai-input" placeholder="https://free.v36.cm/v1/chat/completions" autocomplete="off" />
      </div>
      <div class="ai-field">
        <label class="ai-label" for="apiModelInput">模型</label>
        <input type="text" id="apiModelInput" class="ai-input" placeholder="gpt-4o-mini" autocomplete="off" />
      </div>
      <div class="ai-shortcuts">摘要 Alt+T &nbsp;·&nbsp; 翻译 Alt+Shift+T</div>
    </div>

    <div class="footer" id="compatNote"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
